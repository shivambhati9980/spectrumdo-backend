<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ SpectrumDo — The Ultimate To-Do Experience</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg-gradient-start: #f8faff;
      --bg-gradient-end: #eef2ff;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
      --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --accent: #8b5cf6;
      --danger: #ef4444;
      --success: #10b981;
      --border-light: #e2e8f0;
      --badge-bg: #f1f5f9;
    }

    body.dark {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #1e293b;
      --glass-bg: rgba(15, 23, 42, 0.75);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --badge-bg: #1e293b;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100vh;
      transition: all 0.3s ease;
      color: var(--text-primary);
    }

    /* Floating Orbs */
    .orb {
      position: fixed;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, rgba(139,92,246,0) 70%);
      border-radius: 50%;
      top: -20vh;
      right: -10vw;
      z-index: -1;
      animation: float 18s infinite alternate;
      pointer-events: none;
    }
    .orb2 {
      left: -15vw;
      bottom: -10vh;
      top: auto;
      background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, rgba(236,72,153,0) 70%);
      animation: float 22s infinite alternate-reverse;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(4%, 6%) scale(1.1); }
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--card-shadow);
    }

    /* Login Container */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .login-card {
      width: 450px;
      max-width: 90%;
      padding: 2rem;
    }

    .auth-form h3 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .auth-form .input-group {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--badge-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 0 12px;
    }

    .auth-form .input-group i {
      color: var(--accent);
    }

    .auth-form .input-group input {
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
    }

    .auth-switch {
      text-align: center;
      margin-top: 1rem;
    }

    .auth-switch a {
      color: var(--accent);
      cursor: pointer;
    }

    /* Dashboard */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding: 1rem 2rem;
    }

    .logo h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 1.9rem;
    }

    .theme-toggle, .logout-btn {
      background: var(--badge-bg);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 60px;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--accent);
    }

    .logout-btn {
      width: auto;
      padding: 0 20px;
      background: var(--danger);
      color: white;
    }

    .stats-panel {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .stat-card {
      flex: 1;
      padding: 1.2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border-radius: 1.6rem;
      text-align: center;
    }

    .stat-number {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(145deg, var(--accent), #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .progress-bar-container {
      background: var(--border-light);
      border-radius: 30px;
      height: 8px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ec4899);
      border-radius: 30px;
      transition: width 0.4s;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1.2rem 1.5rem;
    }

    .filter-group {
      flex: 1;
      min-width: 140px;
    }

    .filter-group input, .filter-group select {
      width: 100%;
      padding: 10px 14px;
      background: var(--badge-bg);
      border: 1px solid var(--border-light);
      border-radius: 60px;
      color: var(--text-primary);
      outline: none;
    }

    .add-task-form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 2rem;
      padding: 1.5rem;
      align-items: flex-end;
    }

    .form-field {
      flex: 1;
      min-width: 140px;
    }

    .form-field label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .add-task-form input, .add-task-form select {
      width: 100%;
      padding: 12px 14px;
      background: var(--badge-bg);
      border: 1px solid var(--border-light);
      border-radius: 1.2rem;
      color: var(--text-primary);
      margin-top: 6px;
    }

    .btn-primary {
      background: linear-gradient(100deg, var(--accent), #a855f7);
      border: none;
      padding: 12px 28px;
      border-radius: 3rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      padding: 0 0.5rem;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--danger);
      padding: 8px 18px;
      border-radius: 30px;
      color: var(--danger);
      cursor: pointer;
    }

    .tasks-list {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      background: var(--glass-bg);
      backdrop-filter: blur(6px);
      border-radius: 1.5rem;
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      border: 1px solid var(--glass-border);
      cursor: grab;
    }

    .task-check {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .task-content {
      flex: 4;
      min-width: 180px;
    }

    .task-text {
      font-weight: 600;
      font-size: 1rem;
    }

    .completed-task .task-text {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.7rem;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 40px;
      background: var(--badge-bg);
      font-weight: 600;
    }

    .priority-high { background: #fee2e2; color: #b91c1c; }
    .priority-medium { background: #fff3e3; color: #b45309; }
    .priority-low { background: #e0f2fe; color: #0c4a6e; }

    .task-actions button {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 500px;
    }

    @media (max-width: 760px) {
      .add-task-form, .filter-bar { flex-direction: column; }
      .task-item { flex-direction: column; align-items: stretch; }
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
<div class="orb"></div>
<div class="orb orb2"></div>

<!-- Login Container -->
<div id="loginContainer" class="login-container">
  <div class="login-card glass-card">
    <div class="logo" style="text-align: center;">
      <h1><i class="fas fa-bolt"></i> SpectrumDo</h1>
      <p>Your Ultimate Productivity Suite</p>
    </div>
    
    <div id="loginForm" class="auth-form">
      <h3><i class="fas fa-sign-in-alt"></i> Login</h3>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password">
      </div>
      <button class="btn-primary" onclick="handleLogin()">Login</button>
      <p class="auth-switch">New user? <a onclick="showRegister()">Create Account</a></p>
    </div>
    
    <div id="registerForm" class="auth-form" style="display:none;">
      <h3><i class="fas fa-user-plus"></i> Register</h3>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="regName" placeholder="Full Name">
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="regEmail" placeholder="Email">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="regPassword" placeholder="Password">
      </div>
      <button class="btn-primary" onclick="handleRegister()">Register</button>
      <p class="auth-switch">Already have account? <a onclick="showLogin()">Login</a></p>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none;">
  <div class="app-container">
    <div class="top-bar glass-card">
      <div class="logo">
        <h1><i class="fas fa-bolt"></i> SpectrumDo</h1>
        <p>Welcome, <span id="userName"></span>!</p>
      </div>
      <div style="display: flex; gap: 15px;">
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="stats-panel">
      <div class="stat-card"><div><i class="fas fa-tasks"></i> Total</div><div class="stat-number" id="totalTasks">0</div></div>
      <div class="stat-card"><div><i class="fas fa-check-circle"></i> Completed</div><div class="stat-number" id="completedTasks">0</div></div>
      <div class="stat-card"><div><i class="fas fa-chart-line"></i> Progress</div><div class="stat-number" id="progressPercent">0%</div><div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div></div>
    </div>

    <div class="filter-bar glass-card">
      <div class="filter-group"><input type="text" id="searchInput" placeholder="Search tasks..."></div>
      <div class="filter-group"><select id="statusFilter"><option value="all">All</option><option value="active">Active</option><option value="completed">Completed</option></select></div>
      <div class="filter-group"><select id="priorityFilter"><option value="all">All Priorities</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></div>
    </div>

    <div class="add-task-form glass-card">
      <div class="form-field"><label>Task</label><input type="text" id="taskTextInput" placeholder="Write something amazing..."></div>
      <div class="form-field"><label>Due Date</label><input type="date" id="dueDateInput"></div>
      <div class="form-field"><label>Priority</label><select id="prioritySelect"><option value="Medium">Medium</option><option value="High">High</option><option value="Low">Low</option></select></div>
      <div class="form-field"><label>Category</label><select id="categorySelect"><option value="Personal">Personal</option><option value="Work">Work</option><option value="Shopping">Shopping</option><option value="Health">Health</option></select></div>
      <button class="btn-primary" onclick="addTask()">Add Task</button>
    </div>

    <div class="glass-card" style="padding: 1.2rem;">
      <div class="task-header">
        <h3>Your Tasks</h3>
        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
      </div>
      <div id="tasksContainer" class="tasks-list"></div>
    </div>
    <footer>🚀 Backend connected • MongoDB • JWT Auth • Real-time sync</footer>
  </div>
</div>

<script>
  // API Configuration
  const API_URL = 'http://localhost:5000/api';
  
  let tasks = [];
  let currentFilter = 'all';
  let sortableInstance = null;
  
  // ========== AUTH FUNCTIONS ==========
  
  async function handleRegister() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    
    try {
      const response = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showDashboard();
        await loadTasks();
        showToast('Account created successfully! 🎉', 'success');
      } else {
        showToast(data.message, 'error');
      }
    } catch (error) {
      showToast('Backend not running! Start with: npm run dev', 'error');
    }
  }
  
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    try {
      const response = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showDashboard();
        await loadTasks();
        showToast(`Welcome back, ${data.user.name}! 👋`, 'success');
      } else {
        showToast(data.message, 'error');
      }
    } catch (error) {
      showToast('Cannot connect to backend. Make sure server is running on port 5000', 'error');
    }
  }
  
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginContainer').style.display = 'flex';
    tasks = [];
    showToast('Logged out successfully! 👋', 'success');
  }
  
  function showDashboard() {
    const user = JSON.parse(localStorage.getItem('user'));
    document.getElementById('userName').innerText = user.name;
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }
  
  function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  }
  
  function showLogin() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
  }
  
  // ========== TASK FUNCTIONS ==========
  
  async function loadTasks() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
      const response = await fetch(`${API_URL}/tasks`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        tasks = await response.json();
        renderTasks();
        updateStats();
      } else if (response.status === 401) {
        logout();
      }
    } catch (error) {
      console.error('Error loading tasks:', error);
    }
  }
  
  async function addTask() {
    const text = document.getElementById('taskTextInput').value.trim();
    if (!text) {
      showToast('Please enter a task!', 'error');
      return;
    }
    
    const token = localStorage.getItem('token');
    const newTask = {
      text: text,
      priority: document.getElementById('prioritySelect').value,
      category: document.getElementById('categorySelect').value,
      dueDate: document.getElementById('dueDateInput').value || null
    };
    
    try {
      const response = await fetch(`${API_URL}/tasks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(newTask)
      });
      
      if (response.ok) {
        const savedTask = await response.json();
        tasks.push(savedTask);
        renderTasks();
        updateStats();
        document.getElementById('taskTextInput').value = '';
        document.getElementById('dueDateInput').value = '';
        showToast('Task added successfully! ✅', 'success');
        canvasConfetti({ particleCount: 30, spread: 50, origin: { y: 0.7 } });
      }
    } catch (error) {
      showToast('Error adding task', 'error');
    }
  }
  
  async function toggleTask(id) {
    const token = localStorage.getItem('token');
    try {
      const response = await fetch(`${API_URL}/tasks/${id}/toggle`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        const updatedTask = await response.json();
        const index = tasks.findIndex(t => t._id === id);
        if (index !== -1) {
          tasks[index].completed = updatedTask.completed;
          renderTasks();
          updateStats();
          showToast(updatedTask.completed ? 'Task completed! 🎉' : 'Task reopened! ↩️', 'success');
          if (updatedTask.completed) {
            canvasConfetti({ particleCount: 40, spread: 60, origin: { y: 0.7 } });
          }
        }
      }
    } catch (error) {
      console.error('Error toggling task:', error);
    }
  }
  
  async function deleteTask(id) {
    if (!confirm('Delete this task permanently?')) return;
    
    const token = localStorage.getItem('token');
    try {
      const response = await fetch(`${API_URL}/tasks/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        tasks = tasks.filter(t => t._id !== id);
        renderTasks();
        updateStats();
        showToast('Task deleted! 🗑️', 'success');
      }
    } catch (error) {
      console.error('Error deleting task:', error);
    }
  }
  
  async function clearCompleted() {
    const completedTasks = tasks.filter(t => t.completed);
    if (completedTasks.length === 0) {
      showToast('No completed tasks to clear!', 'info');
      return;
    }
    
    if (!confirm(`Clear ${completedTasks.length} completed tasks?`)) return;
    
    for (const task of completedTasks) {
      await deleteTask(task._id);
    }
    showToast('Completed tasks cleared! ✨', 'success');
  }
  
  // ========== UI FUNCTIONS ==========
  
  function renderTasks() {
    let filtered = [...tasks];
    
    if (currentFilter === 'active') {
      filtered = filtered.filter(t => !t.completed);
    } else if (currentFilter === 'completed') {
      filtered = filtered.filter(t => t.completed);
    }
    
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    if (searchTerm) {
      filtered = filtered.filter(t => t.text.toLowerCase().includes(searchTerm));
    }
    
    const priorityVal = document.getElementById('priorityFilter')?.value;
    if (priorityVal && priorityVal !== 'all') {
      filtered = filtered.filter(t => t.priority === priorityVal);
    }
    
    const container = document.getElementById('tasksContainer');
    
    if (filtered.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:3rem;opacity:0.6;"><i class="fas fa-rocket"></i> No tasks — add one!</div>';
      return;
    }
    
    container.innerHTML = filtered.map(task => `
      <div class="task-item ${task.completed ? 'completed-task' : ''}" data-id="${task._id}">
        <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task._id}')">
        <div class="task-content">
          <div class="task-text">${escapeHtml(task.text)}</div>
          <div class="task-meta">
            <span class="badge priority-${task.priority.toLowerCase()}">${task.priority}</span>
            <span class="badge">${task.category || 'Personal'}</span>
            ${task.dueDate ? `<span class="badge">📅 ${new Date(task.dueDate).toLocaleDateString()}</span>` : ''}
          </div>
        </div>
        <div class="task-actions">
          <button onclick="deleteTask('${task._id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');
    
    initSortable();
  }
  
  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;
    const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
    
    document.getElementById('totalTasks').innerText = total;
    document.getElementById('completedTasks').innerText = completed;
    document.getElementById('progressPercent').innerText = `${percent}%`;
    document.getElementById('progressFill').style.width = `${percent}%`;
  }
  
  function initSortable() {
    const container = document.getElementById('tasksContainer');
    if (sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(container, {
      animation: 300,
      handle: '.task-item',
      ghostClass: 'sortable-ghost'
    });
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.style.cssText = `
      position: fixed; bottom: 20px; right: 20px; background: ${type === 'error' ? '#ef4444' : '#10b981'};
      color: white; padding: 12px 24px; border-radius: 10px; z-index: 2000;
      animation: slideIn 0.3s ease; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    `;
    toast.innerHTML = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function toggleTheme() {
    document.body.classList.toggle('dark');
    const icon = document.querySelector('.theme-toggle i');
    if (document.body.classList.contains('dark')) {
      icon.classList.replace('fa-moon', 'fa-sun');
    } else {
      icon.classList.replace('fa-sun', 'fa-moon');
    }
  }
  
  // Event Listeners
  document.getElementById('searchInput')?.addEventListener('input', () => renderTasks());
  document.getElementById('statusFilter')?.addEventListener('change', (e) => {
    currentFilter = e.target.value;
    renderTasks();
  });
  document.getElementById('priorityFilter')?.addEventListener('change', () => renderTasks());
  
  // Check if already logged in
  if (localStorage.getItem('token')) {
    showDashboard();
    loadTasks();
  }
  
  // Set default due date
  if (document.getElementById('dueDateInput')) {
    const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0,10);
    document.getElementById('dueDateInput').value = tomorrow;
  }
  
  // Add CSS animation
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
